<div class="flex justify-between flex-row-reverse">
    <!--filter/search on list-->
    <div class="flex justify-between gap-4 flex-row-reverse items-center">
        <div class="card flex justify-center">
            <p-select [options]="statuses" [(ngModel)]="selectedStatus" optionLabel="label"
                placeholder="Select a Status" class="w-full md:w-56" (onChange)="filterList()" />
        </div>
        <div class="card flex justify-center">
            <p-autocomplete [(ngModel)]="selectedCourse" [suggestions]="items" optionLabel="courseName"
                (completeMethod)="search($event)" (onSelect)="filterList()" (onClear)="getAllCourses()"
                placeholder="search with course name" />
        </div>
    </div>
    <!-- add new course -->
    <div class="card flex justify-center gap-4">
        <p-button label="add course" icon="pi pi-plus" [routerLink]="['/courses/new']" />
    </div>
</div>

<!-- courses list -->
<div class="card mt-3">
    <p-table [value]="filteredCourses" [tableStyle]="{ 'min-width': '50rem' }" [paginator]="true" [rows]="rows"
        [totalRecords]="filteredCourses ? filteredCourses.length : 0" [first]="first" showFirstLastIcon="false"
        [lazy]="false" stripedRows>
        <ng-template #header>
            <tr>
                <th>ID</th>
                <th>Course Name</th>
                <th>Instructor Name</th>
                <th>Category</th>
                <th>Duration</th>
                <th>Price</th>
                <th>Status</th>
                <th>Created Date</th>
                <th>Actions</th>
            </tr>
        </ng-template>
        <ng-template #body let-course>
            <tr>
                @if(!isSkeletonExist){
                <td>{{course.id}}</td>
                <td>{{ course.courseName }}</td>
                <td>{{ course.instructor }}</td>
                <td>{{ course.category}}</td>
                <td>{{ course.duration}}</td>
                <td>{{ course.price}}</td>
                <td>{{ course.status?.label}}</td>
                <td>{{ course.createdDate}}</td>
                <td>
                    <div class="flex justify-between">
                        <i class="pi pi-trash text-red-500 cursor-pointer" (click)="deleteCourse($event,course)"></i>
                        <i class="pi pi-pen-to-square text-green-500 cursor-pointer"
                            [routerLink]="[`/courses/${course.id}/edit`]"></i>
                        <i class="pi pi-eye text-blue-500 cursor-pointer" [routerLink]="['/courses/',course.id]"></i>
                    </div>
                </td>
                }
                @else {
                <td><p-skeleton /></td>
                <td><p-skeleton /></td>
                <td><p-skeleton /></td>
                <td><p-skeleton /></td>
                <td><p-skeleton /></td>
                <td><p-skeleton /></td>
                <td><p-skeleton /></td>
                <td><p-skeleton /></td>
                <td><p-skeleton /></td>
                }

            </tr>
        </ng-template>
    </p-table>
    <p-toast />

    <p-confirmdialog />

</div>
